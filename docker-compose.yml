services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      PRIVEIL_DEBUG: "false"
      PRIVEIL_JUDGE_BASE_URL: "http://vllm:8000/v1"
      PRIVEIL_JUDGE_MODEL: "Qwen/Qwen3-4B-Instruct-2507"
    depends_on:
      - vllm

  vllm:
    image: vllm/vllm-openai:latest
    command:
      - "serve"
      - "Qwen/Qwen3-4B-Instruct-2507"
      - "--enable-prefix-caching"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.9"
    ports:
      - "8001:8000"

  test:
    build:
      context: .
      target: test
    command: ["pytest", "tests/", "-v"]
